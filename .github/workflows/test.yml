name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bun:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run bun tests
        run: bun test

  rust:
    runs-on: "macos-latest"
    steps:
      - uses: actions/checkout@v6

      - name: Install git-crypt
        if: ${{ secrets.GIT_CRYPT_KEY_B64 != '' }}
        run: brew install git-crypt

      - name: Verify encrypted cassette checkout
        if: ${{ secrets.GIT_CRYPT_KEY_B64 != '' }}
        run: bash scripts/assert-cassette-encrypted.sh tests/cassettes/daylite-client-replay.json

      - name: Unlock git-crypt cassettes
        if: ${{ secrets.GIT_CRYPT_KEY_B64 != '' }}
        env:
          GIT_CRYPT_KEY_B64: ${{ secrets.GIT_CRYPT_KEY_B64 }}
        run: |
          temp_key="$(mktemp)"
          if base64 --help 2>&1 | grep -q -- '--decode'; then
            printf '%s' "$GIT_CRYPT_KEY_B64" | base64 --decode > "$temp_key"
          else
            printf '%s' "$GIT_CRYPT_KEY_B64" | base64 -D > "$temp_key"
          fi
          git-crypt unlock "$temp_key"
          rm -f "$temp_key"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run rust warning check
        run: cargo check --manifest-path src-tauri/Cargo.toml
        env:
          RUSTFLAGS: -D warnings

      - name: Run rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
